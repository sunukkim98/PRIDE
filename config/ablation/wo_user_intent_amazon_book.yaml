# ============================================================
# Ablation: w/o User Intent Weight  |  Dataset: Amazon-Book
# ablation='wo_user_intent'  →  user intent weight fixed to 1
#
# NOTE: lr / weight_decay still need Full model best values.
# ============================================================
project: MF-ABLATION
program: python3
command:
  - python3
  - main.py
  - --wandb
method: grid
metric:
  name: valid_Recall@20
  goal: maximize
parameters:
  # --- dataset-specific (Full model best) ---
  dataset:
    values: ['Amazon-Book']
  begin_adv:
    values: [10]
  ema:
    values: [1.0]
  num_codebook:
    values: [256]
  lr:
    values: [0.001]
  weight_decay:
    values: [0.001]
  energy_r:
    values: [4]
  energy_lambda:
    values: [0.5]
  beta:
    values: [0.05]
  drop_rate:
    values: [0.1]
  num_gradual:
    values: [30000]
  # --- ablation flag ---
  ablation:
    values: ['wo_user_intent']
  # --- fixed ---
  model:
    values: ['MF']
  method:
    values: ['PRIDE']
  weight_mode:
    values: ['lambda_power']
  seed:
    values: [2024]
  min_interaction:
    values: [10]
  noise:
    values: [0.0]
  add_p:
    values: [1.0]
  out_dim:
    values: [64]
  use_gpu:
    values: [true]
  device:
    values: ['gpu']
  device_id:
    values: [0]
  batch_size:
    values: [2048]
  test_batch_size:
    values: [2048]
  patience:
    values: [100]
  val_interval:
    values: [1]
  min_epochs:
    values: [0]
  n_epochs:
    values: [100]
  rec_top_k:
    values:
      - [20, 50]
  temp:
    values: [0]
  item_num:
    values: [0]
  num_hirearchy:
    values: [1]
  alpha:
    values: [0]
  gamma:
    values: [0]
  relabel_ratio:
    values: [0]
  co_lambda:
    values: [0]
  mean_loss_interval:
    values: [0]
  energy_gamma:
    values: [1.0]
  lambda_dis:
    values: [1.0]
  tau:
    values: [1.0]
  weight_eps:
    values: [1.0e-8]
  wgm_alpha:
    values: [0.5]
  lambda_mix:
    values: [0.5]
  gate_tau:
    values: [1.0]
