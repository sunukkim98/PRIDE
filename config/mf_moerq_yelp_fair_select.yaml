project: MF-PRIDE-FairSelect
program: main.py
command:
  - python
  - main.py
  - --wandb
method: grid
metric:
  name: valid_Recall@20
  goal: maximize
parameters:
  seed:
    values: [2024]
  model:
    values: ['MF']
  dataset:
    values: ['Yelp']
  method:
    values: ['PRIDE']
  min_interaction:
    values: [10]
  noise:
    values: [0]
  add_p:
    values: [1]
  out_dim:
    values: [64]
  use_gpu:
    values: [true]
  device:
    values: ['gpu']
  device_id:
    values: [0]
  batch_size:
    values: [2048]
  test_batch_size:
    values: [2048]
  patience:
    values: [100]
  val_interval:
    values: [1]
  lr:
    values: [0.001]
  weight_decay:
    values: [0.001]
  min_epochs:
    values: [0]
  n_epochs:
    values: [100]
  rec_top_k:
    values: [[20, 50]]
  begin_adv:
    values: [10]
  ema:
    values: [0.75]
  num_codebook:
    values: [512]
  num_hirearchy:
    values: [1]
  weight_mode:
    values: ['lambda_power']
  energy_r:
    values: [4]
  energy_lambda:
    values: [0.75]
  energy_gamma:
    values: [1]
  lambda_dis:
    values: [1]
  tau:
    values: [1]
  weight_eps:
    values: [1.0e-8]
  wgm_alpha:
    values: [0.5]
  lambda_mix:
    values: [0.5]
  gate_tau:
    values: [1]
  use_original_requiem_after_warmup:
    values: [false]
  beta:
    values: [1]
  ablation:
    values: ['full']
  drop_rate:
    values: [0.2]
  num_gradual:
    values: [30000]
  alpha:
    values: [0]
  gamma:
    values: [0]
  relabel_ratio:
    values: [0]
  co_lambda:
    values: [0]
  mean_loss_interval:
    values: [0]
  temp:
    values: [0]
  item_num:
    values: [0]
