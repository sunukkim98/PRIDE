project: Hybrid-REQUIEM
program: python
command:
  - python
  - main.py
  - --wandb
method: bayes
metric:
  name: valid_Recall@20
  goal: maximize
parameters:
  seed:
    values: [2024]
  model:
    values: ['MF']
  dataset:
    values: ['MIND']
  min_interaction:
    values: [10]
  noise:
    values: [0.0]
  add_p:
    values: [1.0]
  out_dim:
    values: [64]
  use_gpu:
    values: [True]
  device:
    values: ['gpu']
  device_id:
    values: [0]
  batch_size:
    values: [2048]
  test_batch_size:
    values: [2048]
  patience:
    values: [100]
  val_interval:
    values: [1]
  lr:
    values: [1e-3]
  weight_decay:
    values: [1e-3]
  min_epochs:
    values: [40]
  n_epochs:
    values: [100]
  rec_top_k:
    values: [[20, 50]]
  method:
    values: ['HVQ']
  temp:
    values: [0]
  item_num:
    values: [0]
  num_codebook:
    values: [128, 256, 512]
  num_hirearchy:
    values: [1]
  begin_adv:
    values: [10, 15, 30, 50]
  ema:
    values: [0.0, 0.25, 0.5, 0.75, 0.99, 1.0]
  alpha:
    values: [0.25, 0.5, 1.0]

early_terminate:
  type: hyperband
  s: 2
  eta: 3
  max_iter: 20

run_cap: 200
min_iter: 50
covergence:
  metric: valid_Recall@20
  window_size: 5
  min_improvement: 0.005
  patience: 5
