project: requiem
program: python
command:
  - python
  - main.py
  - --wandb
method: grid
metric:
  name: valid_Recall@20
  goal: maximize
parameters:
  seed:
    values: [2024]
  model:
    values: ['LightGCN']
  dataset:
    values: ['MIND']
  min_interaction:
    values: [10]
  noise:
    values: [0.0]
  add_p:
    values: [1.0]
  out_dim:
    values: [64]
  use_gpu:
    values: [True]
  device:
    values: ['gpu']
  device_id:
    values: [0]
  batch_size:
    values: [2048]
  test_batch_size:
    values: [2048]
  patience:
    values: [20]
  val_interval:
    values: [5]
  lr:
    values: [0.01]
  weight_decay:
    values: [0.0001]
  min_epochs:
    values: [40]
  n_epochs:
    values: [1000]
  rec_top_k:
    values: [[20, 50]]
  method:
    values: ['LinearVQ']
  temp:
    values: [0]
  item_num:
    values: [0]
  num_codebook:
    values: [512]
  num_hirearchy:
    values: [1]
  begin_adv:
    values: [15]
  ema:
    values: [0.9]
  alpha:
    values: [0.3]
